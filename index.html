<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Early Morning Pickle Showdown</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root{ --teal:#0f766e; --tealD:#115e59; --lime:#a3e635; --limeD:#84cc16;
    --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;
    --s500:#64748b;--s700:#334155;--s800:#1e293b;--s900:#0f172a;--ccf:#ccfbf1;--t100:#99f6e4;}
  body{ font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--s50); color:var(--s900); line-height:1.4; }
  .wrap{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--s50); position:relative; }
  .tnum{ font-variant-numeric:tabular-nums; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; }
  .header{ padding:22px 20px 16px; background:var(--tealD); color:#fff; border-bottom-left-radius:24px; border-bottom-right-radius:24px; }
  .hrow{ display:flex; align-items:center; gap:8px; }
  .logo{ width:28px; height:28px; border-radius:50%; background:var(--lime); display:flex; align-items:center; justify-content:center; }
  .logo span{ width:12px; height:12px; border-radius:50%; background:var(--tealD); }
  .header h1{ font-size:18px; font-weight:800; letter-spacing:-.02em; line-height:1.1; }
  .sync{ margin-left:auto; display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--t100); white-space:nowrap; }
  .sdot{ width:8px; height:8px; border-radius:50%; }
  .meta{ margin-top:4px; font-size:13px; color:var(--ccf); }
  main{ flex:1; padding:16px 16px 110px; }
  .msw{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .circ{ width:36px; height:36px; border-radius:50%; background:#fff; border:1px solid var(--s200); color:var(--s500); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .circ:disabled{ opacity:.3; }
  .msw .lbl{ flex:1; text-align:center; font-size:16px; font-weight:700; color:var(--s800); }
  .pill{ border-radius:999px; padding:6px 12px; font-size:12px; font-weight:600; border:1px solid var(--s200); background:#fff; color:var(--s500); }
  .pill.on{ border-color:var(--teal); background:var(--teal); color:#fff; }
  .toggle{ margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:4px; background:var(--s100); border-radius:999px; padding:4px; }
  .toggle button{ border-radius:999px; padding:6px 0; font-size:12px; font-weight:600; color:var(--s400); }
  .toggle button.on{ background:#fff; color:var(--teal); box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .champ{ margin-top:12px; border-radius:16px; background:var(--tealD); color:#fff; padding:16px; position:relative; overflow:hidden; }
  .champ .blob{ position:absolute; right:-24px; top:-24px; width:96px; height:96px; border-radius:50%; background:rgba(163,230,53,.2); }
  .champ .tag{ display:flex; align-items:center; gap:6px; color:#bef264; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; }
  .champ .name{ font-size:24px; font-weight:800; letter-spacing:-.02em; }
  .champ .big{ font-size:30px; font-weight:800; line-height:1; }
  .champ .unit{ font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--t100); }
  .champ .line{ margin-top:4px; font-size:12px; color:var(--ccf); }
  .fe{ display:flex; align-items:flex-end; justify-content:space-between; margin-top:4px; }
  .rows{ margin-top:12px; display:flex; flex-direction:column; gap:8px; }
  .row{ display:flex; align-items:center; gap:10px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:10px 12px; }
  .row.first{ border-color:#fde68a; background:#fffbeb; }
  .row.last{ border-color:#fecaca; background:#fef2f2; }
  .rank{ width:28px; height:28px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--s100); color:var(--s500); }
  .rank.g1{ background:#facc15; color:#713f12; } .rank.g2{ background:var(--s300); color:var(--s700); } .rank.g3{ background:#b45309; color:#fff; }
  .mood{ font-size:20px; line-height:1; flex:none; }
  .nm{ flex:1; min-width:0; } .nm .n{ font-weight:600; color:var(--s900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .nm .s{ font-size:11px; color:var(--s400); }
  .val{ text-align:right; line-height:1; } .val .v{ font-size:20px; font-weight:800; color:var(--teal); } .val .u{ font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:var(--s400); }
  .note{ margin-top:16px; text-align:center; font-size:11px; color:var(--s400); }
  .game{ border-radius:16px; border:1px solid var(--s200); background:#fff; padding:12px; }
  .gtop{ display:flex; align-items:center; justify-content:space-between; } .gdate{ font-size:11px; font-weight:500; color:var(--s400); }
  .gbody{ margin-top:6px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; }
  .team .p{ font-size:14px; line-height:1.2; color:var(--s500); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team.win .p{ font-weight:600; color:var(--s900); } .team.right{ text-align:right; }
  .score{ display:flex; align-items:center; gap:6px; justify-content:center; } .sc{ font-size:24px; font-weight:800; color:var(--s400); } .sc.win{ color:var(--teal); } .dash{ color:var(--s300); font-size:14px; }
  .iconbtn{ color:var(--s300); font-size:16px; padding:2px 4px; }
  .confirm{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--s500); } .confirm .yes{ font-weight:700; color:#dc2626; } .confirm .no{ color:var(--s400); }
  .addrow{ display:flex; gap:8px; } .addrow input{ flex:1; border-radius:12px; border:1px solid var(--s200); background:#fff; padding:10px 12px; font-size:14px; outline:none; }
  .addrow input:focus{ border-color:var(--teal); box-shadow:0 0 0 3px var(--ccf); }
  .addrow button{ border-radius:12px; background:var(--teal); padding:0 16px; font-size:14px; font-weight:600; color:#fff; }
  .addrow button:disabled{ background:var(--s200); color:var(--s400); }
  .player{ display:flex; align-items:center; gap:12px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:10px 12px; }
  .avatar{ width:32px; height:32px; border-radius:50%; background:var(--ccf); color:var(--teal); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
  .player .pn{ flex:1; font-weight:500; color:var(--s800); } .ghost{ font-size:12px; font-weight:500; color:var(--s400); }
  .removed{ display:flex; align-items:center; gap:12px; border-radius:16px; border:1px dashed var(--s200); background:var(--s50); padding:8px 12px; color:var(--s400); }
  .removed .pn{ flex:1; font-size:14px; text-decoration:line-through; } .restore{ font-size:12px; font-weight:500; color:var(--teal); }
  .empty{ margin-top:40px; display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 24px; }
  .empty .ic{ width:56px; height:56px; border-radius:50%; background:var(--ccf); display:flex; align-items:center; justify-content:center; }
  .empty .ic span{ width:24px; height:24px; border-radius:50%; background:#5eead4; opacity:.6; }
  .empty h3{ margin-top:12px; font-size:16px; font-weight:700; color:var(--s800); } .empty p{ margin-top:4px; font-size:14px; color:var(--s500); }
  .empty .cta{ margin-top:16px; border-radius:12px; background:var(--teal); padding:8px 16px; font-size:14px; font-weight:600; color:#fff; }
  .arep{ display:flex; align-items:center; gap:8px; } .arep span.l{ font-size:13px; font-weight:600; color:var(--s500); }
  .arep select{ margin-left:auto; border-radius:10px; border:1px solid var(--s200); background:#fff; padding:6px 10px; font-size:13px; outline:none; }
  .acard{ display:flex; gap:10px; border-radius:16px; border:1px solid var(--s200); background:#fff; padding:12px; }
  .acard .ai{ font-size:20px; line-height:1.1; flex:none; } .acard .at{ font-size:13px; font-weight:700; color:var(--s800); } .acard .ab{ margin-top:2px; font-size:13px; color:var(--s500); line-height:1.45; }
  nav{ position:sticky; bottom:0; z-index:20; max-width:480px; margin:0 auto; width:100%; border-top:1px solid var(--s200); background:rgba(255,255,255,.96); backdrop-filter:blur(8px); padding:8px; display:flex; align-items:center; justify-content:space-around; }
  .navbtn{ display:flex; flex:1; flex-direction:column; align-items:center; gap:2px; padding:4px 0; font-size:10px; font-weight:500; color:var(--s400); }
  .navbtn .ni{ font-size:18px; line-height:1; } .navbtn.on{ color:var(--teal); }
  .fab{ margin-top:-28px; width:56px; height:56px; border-radius:50%; background:var(--lime); color:var(--tealD); display:flex; align-items:center; justify-content:center; font-size:28px; box-shadow:0 8px 16px rgba(0,0,0,.15); }
  .fab:disabled{ background:var(--s200); color:var(--s400); box-shadow:none; }
  .histwrap{ position:sticky; bottom:68px; z-index:10; max-width:480px; margin:0 auto; width:100%; display:flex; justify-content:center; gap:8px; pointer-events:none; }
  .histwrap .pill{ pointer-events:auto; display:inline-flex; align-items:center; gap:6px; box-shadow:0 1px 2px rgba(0,0,0,.05); margin-bottom:4px; }
  .overlay{ position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end; justify-content:center; background:rgba(15,23,42,.4); }
  .sheet{ width:100%; max-width:480px; border-top-left-radius:24px; border-top-right-radius:24px; background:#fff; padding:20px; max-height:92vh; overflow-y:auto; }
  .grab{ margin:0 auto 12px; width:40px; height:4px; border-radius:999px; background:var(--s200); }
  .shead{ display:flex; align-items:center; justify-content:space-between; } .shead h2{ font-size:18px; font-weight:800; } .closeb{ color:var(--s400); font-size:20px; padding:4px; }
  .two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .tbox{ border-radius:16px; border:1px solid; padding:12px; } .tbox.teal{ border-color:#99f6e4; background:rgba(204,251,241,.4); } .tbox.lime{ border-color:#d9f99d; background:rgba(236,252,203,.4); }
  .tbox .lab{ display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--s500); margin-bottom:8px; }
  .tbox .dot{ width:8px; height:8px; border-radius:50%; } .tbox.teal .dot{ background:var(--teal); } .tbox.lime .dot{ background:var(--lime); }
  select.psel{ width:100%; border-radius:8px; border:1px solid var(--s200); background:#fff; padding:8px 10px; font-size:14px; outline:none; } .gap{ height:8px; }
  .stepbox{ border-radius:16px; border:1px solid var(--s200); padding:12px; } .stepbox .lab{ text-align:center; font-size:12px; font-weight:500; color:var(--s500); margin-bottom:8px; }
  .stepper{ display:flex; align-items:center; justify-content:space-between; } .stepbtn{ width:36px; height:36px; border-radius:8px; background:var(--s100); color:var(--s700); font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .stepval{ width:48px; text-align:center; font-size:24px; font-weight:800; } .stepval.teal{ color:var(--teal); } .stepval.lime{ color:var(--limeD); }
  .datebox{ margin-top:16px; display:flex; align-items:center; gap:8px; border-radius:12px; border:1px solid var(--s200); padding:10px 12px; }
  .datebox .dl{ font-size:14px; color:var(--s500); } .datebox input{ margin-left:auto; border:none; outline:none; font-size:14px; color:var(--s700); background:transparent; }
  .warn{ margin-top:8px; text-align:center; font-size:12px; color:#ef4444; }
  .save{ margin-top:16px; width:100%; border-radius:12px; background:var(--teal); padding:12px; font-size:14px; font-weight:600; color:#fff; } .save:disabled{ background:var(--s200); color:var(--s400); }
</style>
</head>
<body>
<div id="app" class="wrap"></div>
<script>
(function(){
  /* ====== Supabase config ====== */
  var SB_URL = "https://vtnymepdnvysurpufyqr.supabase.co";
  var SB_KEY = "sb_publishable_CZLYUJODQoAsPZXLacg1yA_IkCfmlvy";
  var ROW = SB_URL + "/rest/v1/scores_state?id=eq.main";
  var H = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };

  function loadState(){
    return fetch(ROW + "&select=data", { headers: H }).then(function(r){
      if(!r.ok) throw new Error("load " + r.status);
      return r.json();
    }).then(function(rows){
      var d = (rows && rows[0] && rows[0].data) ? rows[0].data : { players:[], games:[] };
      return { players: Array.isArray(d.players)?d.players:[], games: Array.isArray(d.games)?d.games:[] };
    });
  }
  function saveState(st){
    return fetch(ROW, { method:"PATCH", headers: Object.assign({}, H, { Prefer:"return=minimal" }),
      body: JSON.stringify({ data:{ players:st.players, games:st.games }, updated_at:new Date().toISOString() }) })
      .then(function(r){ if(!r.ok) throw new Error("save " + r.status); });
  }

  /* ====== State ====== */
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var WEEKDAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var now=new Date();
  var state={ players:[], games:[], tab:"board", boardMode:"points",
    view:{year:now.getFullYear(),month:now.getMonth(),allTime:false},
    showNew:false, showRemoved:false, confirmDelete:null, draft:null, sync:"loading" };
  var savingFlight=false, pendingSave=null;

  function uid(){ return "id-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8); }
  function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function fmtDate(iso){ var p=iso.split("-").map(Number); return MONTHS[p[1]-1].slice(0,3)+" "+p[2]+", "+p[0]; }
  function fullDate(iso){ var p=iso.split("-").map(Number); var d=new Date(p[0],p[1]-1,p[2]); return WEEKDAYS[d.getDay()]+", "+MONTHS[p[1]-1].slice(0,3)+" "+p[2]; }
  function nameOf(id){ var p=state.players.find(function(x){return x.id===id;}); return p?p.name:"Unknown"; }
  function activePlayers(){ return state.players.filter(function(p){return p.active!==false;}); }
  function removedPlayers(){ return state.players.filter(function(p){return p.active===false;}); }
  function monthGames(){ if(state.view.allTime) return state.games; return state.games.filter(function(g){ var p=g.date.split("-").map(Number); return p[0]===state.view.year && (p[1]-1)===state.view.month; }); }

  function commit(){ render(); pushSave({ players: state.players, games: state.games }); }
  function pushSave(snap){
    if(savingFlight){ pendingSave=snap; return; }
    savingFlight=true; setSync("saving");
    saveState(snap).then(function(){ setSync("synced"); }).catch(function(){ setSync("offline"); })
      .then(function(){ savingFlight=false; if(pendingSave){ var p=pendingSave; pendingSave=null; pushSave(p); } });
  }
  function setSync(s){ state.sync=s; var el=document.getElementById("syncDot"); if(el) updateSync(); }

  /* ====== Standings ====== */
  function statsFor(gs){
    var m={}; function e(id){ if(!m[id]) m[id]={id:id,name:nameOf(id),pf:0,pa:0,g:0,w:0,l:0}; return m[id]; }
    gs.forEach(function(g){ var a=+g.s1,b=+g.s2;
      g.t1.forEach(function(id){var r=e(id);r.pf+=a;r.pa+=b;r.g++;if(a>b)r.w++;else if(a<b)r.l++;});
      g.t2.forEach(function(id){var r=e(id);r.pf+=b;r.pa+=a;r.g++;if(b>a)r.w++;else if(b<a)r.l++;});
    });
    return Object.keys(m).map(function(k){ var r=m[k]; r.diff=r.pf-r.pa; return r; });
  }
  function ranked(gs, mode){
    var arr=statsFor(gs);
    arr.sort(function(x,y){ return mode==="wins"
      ? (y.w-x.w)||(y.diff-x.diff)||(y.pf-x.pf)||x.name.localeCompare(y.name)
      : (y.pf-x.pf)||(y.diff-x.diff)||(y.w-x.w)||x.name.localeCompare(y.name); });
    return arr;
  }
  function trailing(gs, target){
    var ordered=gs.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
    var seq={};
    ordered.forEach(function(g){ var a=+g.s1,b=+g.s2,aw=a>b,bw=b>a;
      g.t1.forEach(function(id){(seq[id]=seq[id]||[]).push(aw?"W":bw?"L":"T");});
      g.t2.forEach(function(id){(seq[id]=seq[id]||[]).push(bw?"W":aw?"L":"T");});
    });
    return Object.keys(seq).map(function(id){ var arr=seq[id],s=0; for(var i=arr.length-1;i>=0;i--){ if(arr[i]===target)s++; else break; } return {id:id,name:nameOf(id),streak:s}; });
  }
  function moodEmoji(rank,total){ if(total<2)return "🎾"; if(rank===1)return "😎"; if(rank===total)return "😠"; if(rank===2)return "😄"; if(rank===3)return "🙂"; if(rank>total-2)return "😕"; return "😐"; }

  /* ====== Analyst ====== */
  function generateReport(date){
    var dayG=state.games.filter(function(g){return g.date===date;});
    var day=ranked(dayG,"wins");
    var all=ranked(state.games,"points");
    var totalPts=dayG.reduce(function(s,g){return s+(+g.s1)+(+g.s2);},0);
    var cards=[];
    var headline=dayG.length+" game"+(dayG.length===1?"":"s")+" · "+day.length+" player"+(day.length===1?"":"s")+" · "+totalPts+" total points";
    if(day.length){ var m=day[0]; var wr=m.g?Math.round((m.w/m.g)*100):0;
      cards.push({i:"⭐",t:"Player of the Day",b:m.name+" ran the table — "+m.w+"W "+m.l+"L across "+m.g+" game"+(m.g===1?"":"s")+", racking up "+m.pf+" points ("+(m.diff>=0?"+":"")+m.diff+" differential, "+wr+"% win rate)."+(day.length>1?" Closest challenger: "+day[1].name+" on "+day[1].pf+" points.":"")});
    }
    if(dayG.length){
      var big=dayG[0],small=dayG[0];
      dayG.forEach(function(g){ var mg=Math.abs((+g.s1)-(+g.s2)); if(mg>Math.abs((+big.s1)-(+big.s2)))big=g; if(mg<Math.abs((+small.s1)-(+small.s2)))small=g; });
      function desc(g){ var a=+g.s1,b=+g.s2,wT=a>=b?g.t1:g.t2,lT=a>=b?g.t2:g.t1; return wT.map(nameOf).join(" & ")+" beat "+lT.map(nameOf).join(" & ")+" "+Math.max(a,b)+"–"+Math.min(a,b); }
      var bm=Math.abs((+big.s1)-(+big.s2));
      cards.push({i:"💥",t:"Statement Win",b: bm===0?"Every game stayed tight — not a single blowout on the board.":desc(big)+" — a "+bm+"-point demolition, the day's most lopsided result."});
      if(dayG.length>1){ var sm=Math.abs((+small.s1)-(+small.s2)); cards.push({i:"🔥",t:"Nail-Biter",b:desc(small)+(sm===0?" in a dead-even battle":", decided by just "+sm)+". Whoever blinked first lost this one."}); }
    }
    var pairW={};
    dayG.forEach(function(g){ var a=+g.s1,b=+g.s2,win=a>b?g.t1:b>a?g.t2:null; if(win){ var k=win.slice().sort().join("|"); pairW[k]=(pairW[k]||0)+1; } });
    var bestPair=null,bestN=0; Object.keys(pairW).forEach(function(k){ if(pairW[k]>bestN){bestN=pairW[k];bestPair=k;} });
    if(bestPair&&bestN>=2){ cards.push({i:"🤝",t:"Dream Team",b:bestPair.split("|").map(nameOf).join(" & ")+" clicked as partners, winning "+bestN+" games together. Real chemistry on the court."}); }
    var hot=trailing(state.games,"W").filter(function(s){return s.streak>=2;}).sort(function(a,b){return b.streak-a.streak;});
    var cold=trailing(state.games,"L").filter(function(s){return s.streak>=2;}).sort(function(a,b){return b.streak-a.streak;});
    if(hot.length) cards.push({i:"📈",t:"On Fire",b:hot[0].name+" is riding a "+hot[0].streak+"-game win streak — the hottest hand in the group right now."});
    if(cold.length) cards.push({i:"📉",t:"Cold Spell",b:cold[0].name+" has dropped "+cold[0].streak+" in a row. Time to switch up the strategy."});
    if(all.length&&day.length){ var leader=all[0],mvp=day[0];
      if(leader.id!==mvp.id){ var rk=all.findIndex(function(p){return p.id===mvp.id;})+1; cards.push({i:"🏅",t:"Season Watch",b:leader.name+" still leads the overall standings on "+leader.pf+" points, but "+mvp.name+"'s strong showing (currently #"+rk+") is closing the gap."}); }
      else { cards.push({i:"🏅",t:"Season Watch",b:leader.name+" backed up the top overall ranking ("+leader.pf+" pts) with another dominant day. The leader looks untouchable."}); }
    }
    var takes=["Tighten up the serve returns and tomorrow's a different story.","Momentum is everything in Americano — keep stacking those points.","The margins are razor-thin at the top. Every rally counts.","Early mornings clearly reward the bold."];
    cards.push({i:"🎤",t:"Analyst's Take",b:takes[(dayG.length+totalPts)%takes.length]});
    return { date:date, headline:headline, cards:cards };
  }

  /* ====== Render ====== */
  function render(){
    var ap=activePlayers();
    document.getElementById("app").innerHTML =
      header(ap) + "<main>" + body(ap) + "</main>" + nav(ap) + histPills() + (state.showNew?sheet(ap):"");
    wire();
  }
  function syncInfo(){ return ({loading:["#fde68a","Loading"],synced:["var(--lime)","Live"],saving:["#fde68a","Saving"],offline:["#fca5a5","Offline"]})[state.sync]||["var(--lime)","Live"]; }
  function updateSync(){ var i=syncInfo(); var d=document.getElementById("syncDot"); var t=document.getElementById("syncTxt"); if(d){ d.style.background=i[0]; d.style.boxShadow=state.sync==="synced"?"0 0 0 3px rgba(163,230,53,.25)":"none"; } if(t) t.textContent=i[1]; }
  function header(ap){ var i=syncInfo();
    return '<div class="header"><div class="hrow"><div class="logo"><span></span></div>'+
      '<h1>Early Morning Pickle Showdown</h1>'+
      '<span class="sync"><span class="sdot" id="syncDot" style="background:'+i[0]+';'+(state.sync==="synced"?"box-shadow:0 0 0 3px rgba(163,230,53,.25);":"")+'"></span><span id="syncTxt">'+i[1]+'</span></span>'+
      '</div><div class="meta">'+ap.length+' player'+(ap.length===1?'':'s')+' &middot; '+state.games.length+' game'+(state.games.length===1?'':'s')+' logged</div></div>';
  }
  function monthSwitcher(){ var lbl=state.view.allTime?"All time":(MONTHS[state.view.month]+" "+state.view.year);
    return '<div class="msw"><button class="circ" data-act="month" data-dir="-1" '+(state.view.allTime?'disabled':'')+'>&#8249;</button>'+
      '<div class="lbl">'+lbl+'</div><button class="circ" data-act="month" data-dir="1" '+(state.view.allTime?'disabled':'')+'>&#8250;</button>'+
      '<button class="pill '+(state.view.allTime?'on':'')+'" data-act="alltime">All time</button></div>';
  }
  function body(ap){ if(state.tab==="board")return leaderboard(ap); if(state.tab==="games")return gamesList(); if(state.tab==="report")return analyst(); return playersScreen(ap); }
  function leaderboard(ap){
    var gs=monthGames(); var isWins=state.boardMode==="wins"; var rk=ranked(gs,state.boardMode);
    var html=monthSwitcher()+'<div class="toggle"><button class="'+(!isWins?'on':'')+'" data-act="mode" data-mode="points">By points</button><button class="'+(isWins?'on':'')+'" data-act="mode" data-mode="wins">By wins</button></div>';
    if(rk.length===0){ var hp=state.players.length>0;
      return html+emptyHTML(hp?"No games this period":"Welcome to the court", hp?"Tap the + button to record your first match and the leaderboard will fill in.":"Add a few players first, then record a game.", (ap.length>=4)?"Record a game":null);
    }
    var L=rk[0];
    html+='<div class="champ"><div class="blob"></div><div class="tag">👑 Leading '+(state.view.allTime?"all time":MONTHS[state.view.month])+' &middot; '+(isWins?"wins":"points")+'</div>'+
      '<div class="fe"><div class="name">'+esc(L.name)+'</div><div style="text-align:right"><div class="big tnum">'+(isWins?L.w:L.pf)+'</div><div class="unit">'+(isWins?"wins":"points")+'</div></div></div>'+
      '<div class="line tnum">'+L.g+' games &middot; '+L.w+'W '+L.l+'L &middot; '+L.pf+' pts &middot; '+(L.diff>=0?"+":"")+L.diff+' diff</div></div>';
    html+='<div class="rows">';
    rk.forEach(function(r,i){ var rank=i+1,total=rk.length; var cls=rank===1?"g1":rank===2?"g2":rank===3?"g3":"";
      var rowcls=rank===1?"row first":(total>1&&rank===total)?"row last":"row";
      var sub=isWins?(r.g+' games &middot; '+r.pf+' pts &middot; '+(r.diff>=0?"+":"")+r.diff):(r.g+' games &middot; '+r.w+'W '+r.l+'L &middot; '+(r.diff>=0?"+":"")+r.diff);
      html+='<div class="'+rowcls+'"><div class="rank '+cls+' tnum">'+rank+'</div><div class="mood">'+moodEmoji(rank,total)+'</div>'+
        '<div class="nm"><div class="n">'+esc(r.name)+'</div><div class="s tnum">'+sub+'</div></div>'+
        '<div class="val"><div class="v tnum">'+(isWins?r.w:r.pf)+'</div><div class="u">'+(isWins?"wins":"pts")+'</div></div></div>';
    });
    html+='</div><div class="note">Ranked by '+(isWins?"games won":"total points scored")+' &middot; '+gs.length+' game'+(gs.length===1?'':'s')+' this period</div>';
    return html;
  }
  function gamesList(){
    var games=monthGames().slice().sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:0;});
    var html=monthSwitcher();
    if(games.length===0) return html+emptyHTML("No games yet","Recorded matches will show up here, newest first.",null);
    html+='<div class="rows">';
    games.forEach(function(g){ var aWon=+g.s1>+g.s2,bWon=+g.s2>+g.s1;
      var del=state.confirmDelete===g.id?'<div class="confirm"><span>Delete?</span><button class="yes" data-act="delgame" data-id="'+g.id+'">Yes</button><button class="no" data-act="cancindel">No</button></div>':'<button class="iconbtn" data-act="askdel" data-id="'+g.id+'">&#128465;</button>';
      html+='<div class="game"><div class="gtop"><span class="gdate">'+fmtDate(g.date)+'</span>'+del+'</div><div class="gbody">'+
        '<div class="team '+(aWon?'win':'')+'">'+g.t1.map(function(id){return '<div class="p">'+esc(nameOf(id))+'</div>';}).join("")+'</div>'+
        '<div class="score"><span class="sc '+(aWon?'win':'')+' tnum">'+g.s1+'</span><span class="dash">&ndash;</span><span class="sc '+(bWon?'win':'')+' tnum">'+g.s2+'</span></div>'+
        '<div class="team right '+(bWon?'win':'')+'">'+g.t2.map(function(id){return '<div class="p">'+esc(nameOf(id))+'</div>';}).join("")+'</div></div></div>';
    });
    return html+'</div>';
  }
  function analyst(){
    if(state.games.length===0) return emptyHTML("No data to analyze yet","Record a few games and your daily match report will appear here.",null);
    var dates=Object.keys(state.games.reduce(function(a,g){a[g.date]=1;return a;},{})).sort(function(a,b){return a<b?1:-1;});
    if(!state._adate || dates.indexOf(state._adate)<0) state._adate=dates[0];
    var rep=generateReport(state._adate);
    var html='<div class="arep"><span class="l">Match report</span><select data-act="adate">'+dates.map(function(d){return '<option value="'+d+'" '+(d===state._adate?'selected':'')+'>'+fullDate(d)+'</option>';}).join("")+'</select></div>';
    html+='<div class="champ" style="margin-top:12px"><div class="blob"></div><div class="tag">📋 Daily Report</div><div class="name" style="margin-top:4px;font-size:20px">'+fullDate(rep.date)+'</div><div class="line tnum">'+esc(rep.headline)+'</div></div>';
    html+='<div class="rows">'+rep.cards.map(function(c){return '<div class="acard"><span class="ai">'+c.i+'</span><div><div class="at">'+esc(c.t)+'</div><div class="ab">'+esc(c.b)+'</div></div></div>';}).join("")+'</div>';
    html+='<div class="note">Generated from your recorded scores</div>';
    return html;
  }
  function playersScreen(ap){
    var html='<div class="addrow"><input id="newPlayer" placeholder="Add a player&hellip;" /><button data-act="addplayer">Add</button></div>';
    if(ap.length===0){ html+=emptyHTML("No players yet","Add everyone who shows up to play. You need at least 4 to record a doubles game.",null); }
    else { html+='<div class="rows" style="margin-top:16px">';
      ap.forEach(function(p){ var has=state.games.some(function(g){return g.t1.indexOf(p.id)>-1||g.t2.indexOf(p.id)>-1;});
        var act=has?'<button class="ghost" data-act="removeplayer" data-id="'+p.id+'">Remove</button>':'<button class="iconbtn" data-act="deleteplayer" data-id="'+p.id+'">&#128465;</button>';
        html+='<div class="player"><div class="avatar">'+esc(p.name.charAt(0).toUpperCase())+'</div><div class="pn">'+esc(p.name)+'</div>'+act+'</div>';
      });
      html+='</div>';
    }
    var rem=removedPlayers();
    if(rem.length>0){ html+='<div style="margin-top:20px"><button class="ghost" data-act="togglerem">'+(state.showRemoved?"Hide":"Show")+' removed players ('+rem.length+')</button>';
      if(state.showRemoved){ html+='<div class="rows" style="margin-top:8px">'+rem.map(function(p){return '<div class="removed"><div class="pn">'+esc(p.name)+'</div><button class="restore" data-act="restoreplayer" data-id="'+p.id+'">&#8634; Restore</button></div>';}).join("")+'</div>'; }
      html+='</div>';
    }
    return html+'<div class="note" style="text-align:left;margin-top:20px">Removed players stay on past leaderboards but won\'t appear when recording new games.</div>';
  }
  function emptyHTML(t,b,cta){ return '<div class="empty"><div class="ic"><span></span></div><h3>'+esc(t)+'</h3><p>'+esc(b)+'</p>'+(cta?'<button class="cta" data-act="opennew">'+esc(cta)+'</button>':'')+'</div>'; }
  function nav(ap){ var can=ap.length>=4;
    return '<nav><button class="navbtn '+(state.tab==="board"?'on':'')+'" data-act="tab" data-tab="board"><span class="ni">🏆</span>Leaderboard</button>'+
      '<button class="fab" data-act="opennew" '+(can?'':'disabled')+'>+</button>'+
      '<button class="navbtn '+(state.tab==="players"?'on':'')+'" data-act="tab" data-tab="players"><span class="ni">👥</span>Players</button></nav>';
  }
  function histPills(){
    return '<div class="histwrap"><button class="pill '+(state.tab==="games"?'on':'')+'" data-act="ttab" data-t="games">☰ Game history</button>'+
      '<button class="pill '+(state.tab==="report"?'on':'')+'" data-act="ttab" data-t="report">📋 Analyst</button></div>';
  }
  function sheet(ap){
    var d=state.draft; var picks=[d.t1a,d.t1b,d.t2a,d.t2b]; var chosen=picks.filter(Boolean);
    var distinct=new Set(chosen).size===chosen.length; var complete=chosen.length===4&&distinct;
    function opts(sv){ var o='<option value="">Player</option>'; ap.forEach(function(p){ var used=picks.indexOf(p.id)>-1&&p.id!==sv; if(!used)o+='<option value="'+p.id+'" '+(sv===p.id?'selected':'')+'>'+esc(p.name)+'</option>'; }); return o; }
    function tbox(label,tint,ka,va,kb,vb){ return '<div class="tbox '+tint+'"><div class="lab"><span class="dot"></span>'+label+'</div><select class="psel" data-act="pick" data-slot="'+ka+'">'+opts(va)+'</select><div class="gap"></div><select class="psel" data-act="pick" data-slot="'+kb+'">'+opts(vb)+'</select></div>'; }
    function sbox(label,tint,key,val){ return '<div class="stepbox"><div class="lab">'+label+'</div><div class="stepper"><button class="stepbtn" data-act="step" data-key="'+key+'" data-d="-1">&minus;</button><div class="stepval '+tint+' tnum">'+val+'</div><button class="stepbtn" data-act="step" data-key="'+key+'" data-d="1">+</button></div></div>'; }
    return '<div class="overlay" data-act="overlay"><div class="sheet" data-stop="1"><div class="grab"></div>'+
      '<div class="shead"><h2>Record a game</h2><button class="closeb" data-act="closenew">&times;</button></div>'+
      '<div class="two">'+tbox("Team A","teal","t1a",d.t1a,"t1b",d.t1b)+tbox("Team B","lime","t2a",d.t2a,"t2b",d.t2b)+'</div>'+
      '<div class="two">'+sbox("Team A score","teal","s1",d.s1)+sbox("Team B score","lime","s2",d.s2)+'</div>'+
      '<div class="datebox"><span class="dl">📅 Date</span><input type="date" id="gameDate" value="'+d.date+'" data-act="setdate" /></div>'+
      ((!distinct&&chosen.length>0)?'<div class="warn">Each player can only be picked once.</div>':'')+
      '<button class="save" data-act="savegame" '+(complete?'':'disabled')+'>Save game</button></div></div>';
  }

  /* ====== Events ====== */
  function wire(){
    document.querySelectorAll("[data-act]").forEach(function(el){
      var act=el.getAttribute("data-act");
      if(act==="pick"){ el.addEventListener("change",function(e){ state.draft[e.target.getAttribute("data-slot")]=e.target.value; render(); }); return; }
      if(act==="setdate"){ el.addEventListener("change",function(e){ state.draft.date=e.target.value; }); return; }
      if(act==="adate"){ el.addEventListener("change",function(e){ state._adate=e.target.value; render(); }); return; }
      el.addEventListener("click",onClick);
    });
    var np=document.getElementById("newPlayer"); if(np){ np.addEventListener("keydown",function(e){ if(e.key==="Enter") addPlayer(); }); }
  }
  function onClick(e){
    var el=e.currentTarget, a=el.getAttribute("data-act");
    if(a==="tab"){ state.tab=el.getAttribute("data-tab"); state.confirmDelete=null; render(); }
    else if(a==="ttab"){ var t=el.getAttribute("data-t"); state.tab=(state.tab===t?"board":t); state.confirmDelete=null; render(); }
    else if(a==="mode"){ state.boardMode=el.getAttribute("data-mode"); render(); }
    else if(a==="month"){ stepMonth(+el.getAttribute("data-dir")); }
    else if(a==="alltime"){ state.view.allTime=!state.view.allTime; render(); }
    else if(a==="opennew"){ openNew(); }
    else if(a==="closenew"){ state.showNew=false; state.draft=null; render(); }
    else if(a==="overlay"){ if(e.target===e.currentTarget){ state.showNew=false; state.draft=null; render(); } }
    else if(a==="savegame"){ saveGame(); }
    else if(a==="step"){ var k=el.getAttribute("data-key"); state.draft[k]=Math.max(0,(+state.draft[k])+(+el.getAttribute("data-d"))); render(); }
    else if(a==="addplayer"){ addPlayer(); }
    else if(a==="removeplayer"){ setActive(el.getAttribute("data-id"),false); }
    else if(a==="restoreplayer"){ setActive(el.getAttribute("data-id"),true); }
    else if(a==="deleteplayer"){ state.players=state.players.filter(function(p){return p.id!==el.getAttribute("data-id");}); commit(); }
    else if(a==="togglerem"){ state.showRemoved=!state.showRemoved; render(); }
    else if(a==="askdel"){ state.confirmDelete=el.getAttribute("data-id"); render(); }
    else if(a==="cancindel"){ state.confirmDelete=null; render(); }
    else if(a==="delgame"){ state.games=state.games.filter(function(g){return g.id!==el.getAttribute("data-id");}); state.confirmDelete=null; commit(); }
  }
  function stepMonth(dir){ if(state.view.allTime){ state.view.allTime=false; render(); return; } var m=state.view.month+dir,y=state.view.year; if(m<0){m=11;y--;} if(m>11){m=0;y++;} state.view.month=m; state.view.year=y; render(); }
  function openNew(){ if(activePlayers().length<4) return; state.draft={t1a:"",t1b:"",t2a:"",t2b:"",s1:0,s2:0,date:todayISO()}; state.showNew=true; render(); }
  function saveGame(){ var d=state.draft; var picks=[d.t1a,d.t1b,d.t2a,d.t2b].filter(Boolean); if(picks.length!==4||new Set(picks).size!==4)return;
    state.games.push({id:uid(),t1:[d.t1a,d.t1b],t2:[d.t2a,d.t2b],s1:+d.s1||0,s2:+d.s2||0,date:d.date}); state.showNew=false; state.draft=null; state.tab="board"; commit(); }
  function addPlayer(){ var inp=document.getElementById("newPlayer"); if(!inp)return; var clean=inp.value.trim(); if(!clean)return;
    if(state.players.some(function(p){return p.active!==false&&p.name.toLowerCase()===clean.toLowerCase();})){ inp.value=""; return; }
    state.players.push({id:uid(),name:clean,active:true}); commit(); }
  function setActive(id,val){ var p=state.players.find(function(x){return x.id===id;}); if(p)p.active=val; commit(); }

  /* ====== Boot + live refresh ====== */
  function boot(){
    loadState().then(function(s){ state.players=s.players; state.games=s.games; state.sync="synced"; render(); })
      .catch(function(){ state.sync="offline"; render(); });
  }
  setInterval(function(){
    if(savingFlight||pendingSave||state.showNew) return;
    loadState().then(function(s){
      var changed = JSON.stringify(s.players)!==JSON.stringify(state.players) || JSON.stringify(s.games)!==JSON.stringify(state.games);
      state.players=s.players; state.games=s.games;
      if(state.sync==="offline") state.sync="synced";
      if(changed) render(); else updateSync();
    }).catch(function(){ state.sync="offline"; updateSync(); });
  }, 5000);

  render(); boot();
})();
</script>
</body>
</html>
